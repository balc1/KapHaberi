name: Borsa Gün Ortası Özeti

on:
  schedule:
    # UTC Saatiyle çalışır. Türkiye (UTC+3) 12:00 için buraya 09:00 yazıyoruz.
    - cron: '0 9 * * *'
  workflow_dispatch: # GitHub'da "Run Workflow" butonu (test için)

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Kodları Çek
        uses: actions/checkout@v3

      - name: Python Kurulumu
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Kütüphaneleri Yükle
        run: |
          pip install -r requirements.txt

      - name: Botu Çalıştır (Gün Ortası)
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          python src/main.py gun_ortasi
